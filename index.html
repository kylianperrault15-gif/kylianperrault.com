    .news-item .date { font-family: 'Space Grotesk'; font-size: 0.7rem; font-weight: 800; color: var(--press-blue); display: block; margin-bottom: 8px; }
    .news-item a { text-decoration: none; color: var(--text-ink); font-size: 1.1rem; font-weight: 600; line-height: 1.4; transition: 0.2s; }
    .news-item a:hover { color: var(--press-blue); text-decoration: underline; }
    .quote-box { margin: 80px 0; padding: 60px 40px; background: var(--glass); border: 1px solid var(--border-ink); text-align: center; }
    .quote-label { font-family: 'Space Grotesk'; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: var(--press-blue); letter-spacing: 3px; display: block; margin-bottom: 25px; }
    .quote-text { font-family: 'Playfair Display', serif; font-size: 2.6rem; font-weight: 700; line-height: 1.3; max-width: 850px; margin: 0 auto; color: var(--text-ink); }
    .quote-author { margin-top: 25px; font-family: 'Space Grotesk'; text-transform: uppercase; font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; color: var(--text-ink); }
    .asset-card { background: var(--glass); border: 1px solid var(--border-ink); padding: 40px; text-align: center; transition: 0.3s; width: 320px; margin: 0 auto; }
    .asset-card i { font-size: 1.8rem; color: var(--press-blue); margin-bottom: 15px; }
    .asset-card h5 { margin: 0; font-family: 'Space Grotesk'; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-ink); }
    .dl-link { margin-top: 25px; display: inline-block; font-family: 'Space Grotesk'; font-weight: 800; font-size: 0.75rem; color: var(--text-ink); text-decoration: none; border-bottom: 2px solid var(--press-blue); padding-bottom: 3px; text-transform: uppercase; }
    .flip-card { background-color: transparent; width: 100%; height: 400px; perspective: 1200px; cursor: none !important; }
    .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); transform-style: preserve-3d; }
    .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 30px; padding: 35px; background: rgba(255,255,255,0.005); backdrop-filter: blur(1px); border: 1px solid rgba(255,255,255,0.4); border-top: 2px solid rgba(255,255,255,0.9); border-left: 1px solid rgba(255,255,255,0.6); border-bottom: 1px solid rgba(0,0,0,0.05); box-shadow: 0 30px 60px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.4); display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; }
    body.dark-mode.mode-skills .flip-card-front, body.dark-mode.mode-skills .flip-card-back { border-color: rgba(255,255,255,0.15); border-top-color: rgba(255,255,255,0.6); }
    .scroll-reflection { position: absolute; left: -50%; width: 200%; height: 250px; background: radial-gradient(ellipse at center, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 30%, rgba(255,255,255,0) 70%); transform: translateY(var(--shine-pos, -150%)) rotate(-10deg); pointer-events: none; z-index: 3; opacity: 0.6; mix-blend-mode: overlay; will-change: transform; transition: transform 0.01s linear; }
    .mouse-glare { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 40%); opacity: 0; transition: opacity 0.3s; pointer-events: none; mix-blend-mode: overlay; }
    .flip-card:hover .mouse-glare { opacity: 0.7; }
    .flip-card-front::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(125deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 40%); pointer-events: none; border-radius: 30px; }
    .flip-card-back { background: rgba(255,255,255,0.15); backdrop-filter: blur(5px); transform: rotateY(180deg); align-items: flex-start; text-align: left; border: 1px solid rgba(255,255,255,0.4); }
    .front-content-top { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; }
    .icon-wrapper { font-size: 5rem; color: var(--text-main); margin-bottom: 25px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.08)); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .flip-card:hover .icon-wrapper { transform: scale(1.15) translateZ(40px); color: var(--accent); filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.3)); }
    .front-title { font-family: 'Space Grotesk'; font-size: 2rem; font-weight: 800; color: var(--text-main); text-shadow: none; }
    .cta-hint { padding: 12px 30px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.4); border-radius: 50px; color: var(--accent); font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .flip-card:hover .cta-hint { background: var(--accent); color: white; border-color: transparent; box-shadow: 0 5px 25px rgba(59, 130, 246, 0.3); }
    .flip-card-back h3 { font-family: 'Space Grotesk'; font-size: 1.6rem; color: var(--accent); font-weight: 800; margin-bottom: 20px; width: 100%; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 15px; }
    .flip-card-back p { font-size: 1rem; line-height: 1.6; color: var(--text-main); margin-bottom: 20px; font-weight: 600; }
    .crackling-spark { position: fixed; width: 4px; height: 4px; background: #06b6d4; border-radius: 50%; pointer-events: none; z-index: 9998; box-shadow: 0 0 5px #2563eb; animation: fly-away 0.6s linear forwards; }
    @keyframes fly-away { 0% { opacity: 1; transform: translate(0,0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }
    .floating-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
    .float-icon { position: absolute; color: var(--text-main); opacity: 0; top: 100%; animation: floatUp linear infinite; filter: blur(1px); }
    body.dark-mode.mode-temporal .float-icon { opacity: 0; color: var(--accent); }
    @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; } 10% { opacity: 0.15; } 90% { opacity: 0.15; } 100% { transform: translateY(-120vh) rotate(360deg) scale(1.2); opacity: 0; } }
    .stardust { position: fixed; pointer-events: none; z-index: 9999; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: fadeOut 1s forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: scale(0); } }
    #svg-goo-filter { position: absolute; visibility: hidden; width: 0; height: 0; }
    .petri-dish { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .exp-page-inner { position: relative; width: 100%; height: calc(100vh - 80px); overflow: hidden; font-family: 'Montserrat', sans-serif; }
    #dish-back { z-index: 0; opacity: 0.4; }
    #dish-front { z-index: 4; opacity: 0.8; pointer-events: none; }
    .bacterium { position: absolute; background: var(--royal-blue); display: flex; align-items: center; justify-content: center; will-change: transform, border-radius; box-shadow: 0 0 15px rgba(65, 105, 225, 0.4); animation: wave-outer 5s ease-in-out infinite alternate; pointer-events: auto; cursor: none !important; user-select: none; touch-action: none; z-index: 5; }
    .nucleus { width: 45%; height: 45%; background: #fff; animation: wave-inner 3s ease-in-out infinite alternate-reverse; box-shadow: 0 0 10px #fff; pointer-events: none; }
    @keyframes wave-outer { 0% { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; } 50% { border-radius: 60% 40% 40% 60% / 60% 60% 40% 40%; } 100% { border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; } }
    @keyframes wave-inner { 0% { border-radius: 50%; transform: scale(0.9) rotate(0deg); } 100% { border-radius: 30% 70%; transform: scale(1.1) rotate(180deg); } }
    .exp-bg-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Syncopate', sans-serif; font-size: 12vw; color: rgba(65, 105, 225, 0.05); z-index: 1; pointer-events: none; text-transform: uppercase; white-space: nowrap; }
    .exp-wrapper { display: flex; height: 100%; width: 100%; position: relative; z-index: 2; }
    .exp-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1); overflow: hidden; background: var(--exp-bg); cursor: none !important; position: relative; }
    .exp-panel.active { flex: 8; cursor: default; background: #fff; color: #000; }
    .exp-panel-label { padding: 40px; writing-mode: vertical-rl; text-transform: uppercase; font-family: 'Syncopate', sans-serif; font-size: 1.3rem; letter-spacing: 5px; display: flex; align-items: center; justify-content: space-between; height: 100%; transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1); color: rgba(255,255,255,0.5); }
    .exp-panel.active .exp-panel-label { writing-mode: horizontal-tb; height: auto; flex-direction: row; border-bottom: 3px solid var(--royal-blue); color: var(--royal-blue); padding: 40px 60px; }
    .exp-panel-content { opacity: 0; transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1); padding: 20px 0; overflow-y: scroll; height: 0; position: relative; scrollbar-width: none; }
    .exp-panel-content::-webkit-scrollbar { display: none; }
    .exp-panel.active .exp-panel-content { opacity: 1; height: 100%; transition-delay: 0.3s; }
    #exp-content-pro { -webkit-mask-image: linear-gradient(to bottom, black 0%, black 75%, rgba(0,0,0,0.3) 95%, transparent 100%); mask-image: linear-gradient(to bottom, black 0%, black 75%, rgba(0,0,0,0.3) 95%, transparent 100%); }
    .exp-timeline-container { position: relative; max-width: 850px; margin: 0 auto; padding-left: 120px; padding-bottom: 100px; }
    .exp-timeline-line { position: absolute; left: 60px; top: 0; width: 2px; height: 100%; background: rgba(65, 105, 225, 0.2); }
    .exp-year-marker { position: absolute; left: 25px; font-family: 'Syncopate', sans-serif; font-size: 0.9rem; color: var(--royal-blue); writing-mode: vertical-rl; transform: rotate(180deg); font-weight: 700; letter-spacing: 2px; }
    .exp-item { position: relative; padding: 35px 0; margin-bottom: 10px; cursor: none !important; transition: all 0.5s ease-out; }
    #exp-content-pro .exp-item { opacity: 0; transform: translateY(30px); }
    #exp-content-pro .exp-item.revealed { opacity: 1; transform: translateY(0); }
    #exp-content-asso .exp-item { opacity: 1 !important; transform: translateY(0) !important; }
    .exp-item::before { content: ''; position: absolute; left: -64px; top: 50%; width: 12px; height: 12px; background: #ddd; border: 2px solid #fff; border-radius: 50%; z-index: 2; transition: all 0.3s; }
    .exp-item:hover::before { background: var(--royal-blue); transform: translateY(-50%) scale(1.5); }
    .exp-info { display: flex; flex-direction: column; gap: 5px; }
    .exp-title { font-size: 1.7rem; font-weight: 900; margin: 0; text-transform: uppercase; color: #000; letter-spacing: -0.5px; }
    .exp-company { font-weight: 700; color: var(--royal-blue); font-size: 1.1rem; text-transform: uppercase; }
    .exp-date-label { font-size: 0.9rem; color: #888; }
    .exp-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 11, 30, 0.6); display: none; justify-content: center; align-items: center; z-index: 50000; backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.4s ease; }
    .exp-modal.active { display: flex; opacity: 1; }
    .exp-modal-content { background: #fff; padding: 40px; width: 85%; max-width: 650px; position: relative; transform: translateY(20px); transition: 0.4s; color: #000; border-radius: 15px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .exp-modal.active .exp-modal-content { transform: translateY(0); }
    .exp-close-modal { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: none !important; color: #ccc; }
    .exp-modal h3 { font-size: 2rem; font-weight: 900; text-transform: uppercase; color: #000; letter-spacing: -0.5px; margin-bottom: 8px; font-family: 'Montserrat', sans-serif; }
    .exp-modal .exp-company { color: var(--royal-blue); font-size: 1.1rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .exp-modal .exp-date-label { color: #888; font-size: 0.9rem; margin-bottom: 20px; display: block; }
    .exp-modal p { font-size: 1.05rem; line-height: 1.6; white-space: pre-line; color: #444; font-family: 'Montserrat', sans-serif; }
    .mobile-menu { display: none; }
    @media (max-width: 900px) {
      .header { padding: 0 20px; justify-content: space-between; }
      .nav-container, .brand-name { display: none; }
      .mobile-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--glass); backdrop-filter: blur(20px); border-top: var(--glass-border); display: flex !important; justify-content: space-around; padding: 12px 5px; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
      .mobile-btn { background: none; border: none; color: var(--text-sec); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 600; width: 16%; cursor: none !important; }
      .mobile-btn.active { color: var(--accent); }
      h2#page-title { font-size: 3.5rem; }
      .subtitle { font-size: 1.4rem; }
      p.intro-text { font-size: 1.1rem; }
      .main-container { padding: 40px 20px; padding-bottom: 100px; }
      .central-line, .electric-spark { left: 20px; }
      .timeline-row { flex-direction: column !important; align-items: flex-end; margin-bottom: 40px; }
      .timeline-content { width: 85%; }
      .timeline-row:nth-child(odd) .timeline-content::after { left: -7px; right: auto; border: none; border-left: var(--glass-border); border-top: var(--glass-border); }
      .timeline-row::before { content: ''; position: absolute; left: 16px; top: 25px; width: 8px; height: 8px; background: var(--text-sec); border-radius: 50%; z-index: 3; }
      .editorial-grid { grid-template-columns: 1fr; gap: 40px; }
      .lead-story { border-right: none; padding-right: 0; border-bottom: 1px solid var(--border-ink); padding-bottom: 40px; }
      .exp-panel-label { font-size: 0.9rem; padding: 20px; }
      .exp-panel.active .exp-panel-label { padding: 20px 30px; }
      .exp-title { font-size: 1.2rem; }
      .exp-timeline-container { padding-left: 70px; }
    }


    /* =============================================
       CREATIONS PAGE
    ============================================= */
:root{--bg:#F8FAFC;--text-main:#0F172A;--text-sec:#475569;--accent:#2563EB;--glass:rgba(255,255,255,0.85);--gb:1px solid rgba(255,255,255,0.5);--card:rgba(255,255,255,0.6);--spot:rgba(37,99,235,0.15);}
body.dark{--bg:#020617;--text-main:#F1F5F9;--text-sec:#94A3B8;--accent:#60A5FA;--glass:rgba(15,23,42,0.8);--gb:1px solid rgba(255,255,255,0.1);--card:rgba(30,41,59,0.6);--spot:rgba(96,165,250,0.25);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text-main);font-family:'Inter',sans-serif;min-height:100vh;transition:background .5s,color .3s;cursor:none;}
a,button{cursor:none;}
#cur{position:fixed;top:0;left:0;width:18px;height:18px;background:#fff;border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0 10px #2563eb,0 0 20px #06b6d4;animation:buzz .1s infinite alternate;transition:opacity .3s,width .2s,height .2s;}
body.hov #cur{width:44px;height:44px;background:rgba(37,99,235,.1);border:2px solid #06b6d4;box-shadow:0 0 30px #2563eb;}
@keyframes buzz{0%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-52%,-48%) scale(1.1)}}

.header{height:72px;background:var(--glass);backdrop-filter:blur(15px);border-bottom:var(--gb);display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:100;}
.brand{font-family:'Space Grotesk';font-weight:700;font-size:1.1rem;color:var(--text-main);}
.hdr-r{display:flex;align-items:center;gap:16px;}
.back-btn,.theme-btn{display:flex;align-items:center;gap:8px;color:var(--text-sec);text-decoration:none;font-weight:600;font-size:.9rem;padding:8px 14px;border-radius:8px;background:none;border:none;transition:.2s;font-family:'Inter';}
.back-btn:hover,.theme-btn:hover{color:var(--accent);background:var(--spot);}

.creations-wrapper .hero{padding:60px 60px 40px;max-width:1400px;margin:0 auto;}
.creations-wrapper .hero h1{font-family:'Space Grotesk';font-size:clamp(2.8rem,6vw,5rem);font-weight:800;letter-spacing:-3px;line-height:.95;color:var(--text-main);margin-bottom:18px;}
.creations-wrapper .hero p{color:var(--text-sec);font-size:1.05rem;max-width:520px;line-height:1.6;}

.creations-wrapper .tabs{display:flex;gap:8px;padding:0 60px;max-width:1400px;margin:0 auto 48px;flex-wrap:wrap;}
.creations-wrapper .tab{padding:9px 20px;border-radius:50px;border:1px solid var(--gb);background:var(--card);backdrop-filter:blur(10px);color:var(--text-sec);font-family:'Inter';font-weight:600;font-size:.85rem;transition:.25s;}
.creations-wrapper .tab:hover,.creations-wrapper .tab.active{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(37,99,235,.3);}

.creations-wrapper .section{margin-bottom:80px;}
.creations-wrapper .sec-label{font-family:'Space Grotesk';font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--text-sec);padding:0 60px;max-width:1400px;margin:0 auto 24px;display:flex;align-items:center;gap:12px;}
.creations-wrapper .sec-label::after{content:'';flex:1;max-width:80px;height:1px;background:var(--text-sec);opacity:.2;}

/* CAROUSEL */
.creations-wrapper .wrap{position:relative;padding:0 60px;max-width:1400px;margin:0 auto;}

/* La scène : masque avec dégradé pour cacher les bords */
.creations-wrapper .scene{
  overflow:hidden;
  /* on laisse de la place verticalement pour le scale du centre */
  padding:30px 0 30px;
  margin:0 -4px;
  /* dégradé sur les côtés pour un fondu élégant */
  -webkit-mask-image:linear-gradient(to right,transparent 0%,black 12%,black 88%,transparent 100%);
  mask-image:linear-gradient(to right,transparent 0%,black 12%,black 88%,transparent 100%);
}

.creations-wrapper .track{
  display:flex;
  gap:20px;
  /* transition fluide */
  transition:transform .6s cubic-bezier(.25,.8,.25,1);
  will-change:transform;
  /* on laisse de la place pour le scale */
  padding:0 4px;
}

/* Carte */
.creations-wrapper .card{
  flex-shrink:0;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  transition:
    transform .5s cubic-bezier(.25,.8,.25,1),
    box-shadow .5s,
    filter .5s,
    opacity .5s;
}
.creations-wrapper .snap-jumping .card{
  transition: none !important;
}

/* Centre : grand, net, ombre bleue */
.creations-wrapper .card.center{
  transform:scale(1.12);
  filter:none;
  opacity:1;
  box-shadow:0 28px 56px -12px rgba(37,99,235,.30);
  z-index:10;
}
/* Voisins directs */
.creations-wrapper .card.s1{
  transform:scale(.94);
  filter:grayscale(30%) brightness(.9);
  opacity:.75;
  z-index:5;
}
/* 2e voisins */
.creations-wrapper .card.s2{
  transform:scale(.86);
  filter:grayscale(60%) brightness(.7);
  opacity:.45;
  z-index:2;
}
/* Plus loin */
.creations-wrapper .card.s3{
  transform:scale(.80);
  filter:grayscale(85%) brightness(.5);
  opacity:.25;
  z-index:1;
}

.creations-wrapper .card img{width:100%;height:100%;object-fit:cover;display:block;}

/* Overlay info */
.creations-wrapper .ov{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 100%);
  padding:28px 18px 16px;
  opacity:0;
  transition:opacity .35s;
  border-radius:0 0 20px 20px;
}
.card.center .creations-wrapper .ov{opacity:1;}
.creations-wrapper .card:hover .creations-wrapper .ov{opacity:1;}
.creations-wrapper .ov h3{font-family:'Space Grotesk';font-size:.95rem;font-weight:700;color:#fff;margin-bottom:3px;}
.creations-wrapper .ov span{font-size:.72rem;color:rgba(255,255,255,.6);}

/* Tag */
.creations-wrapper .ctag{
  position:absolute;top:12px;left:12px;
  background:rgba(37,99,235,.82);
  backdrop-filter:blur(6px);
  color:#fff;font-size:.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;
  padding:4px 10px;border-radius:30px;
  opacity:0;transform:translateY(-6px);
  transition:opacity .3s,transform .3s;
}
.creations-wrapper .card.center .ctag,.creations-wrapper .card:hover .creations-wrapper .ctag{opacity:1;transform:translateY(0);}

/* Tailles */
.creations-wrapper .cr-card{width:280px;height:280px;}



/* Flèches */
.creations-wrapper .arr{
  position:absolute;top:50%;transform:translateY(-50%);z-index:20;
  width:48px;height:48px;border-radius:50%;
  background:var(--glass);backdrop-filter:blur(14px);border:var(--gb);
  color:var(--text-main);display:flex;align-items:center;justify-content:center;
  font-size:1rem;transition:.25s;box-shadow:0 4px 16px rgba(0,0,0,.1);
}
.creations-wrapper .arr:hover{background:var(--accent);color:#fff;border-color:transparent;transform:translateY(-50%) scale(1.08);box-shadow:0 8px 24px rgba(37,99,235,.35);}
.creations-wrapper .arr.prev{left:8px;}
.creations-wrapper .arr.next{right:8px;}

/* Dots */
.creations-wrapper .dots{display:flex;justify-content:center;gap:8px;margin-top:24px;}
.creations-wrapper .dot{width:7px;height:7px;border-radius:50%;background:var(--text-sec);opacity:.25;border:none;transition:.3s;padding:0;}
.creations-wrapper .dot.active{opacity:1;background:var(--accent);width:22px;border-radius:4px;}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(2,6,23,.92);z-index:999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;backdrop-filter:blur(16px);}
.lb.open{opacity:1;pointer-events:all;}
.lb img{max-width:90vw;max-height:86vh;border-radius:16px;object-fit:contain;box-shadow:0 32px 64px rgba(0,0,0,.6);transform:scale(.9);transition:transform .4s cubic-bezier(.25,.8,.25,1);}
.lb.open img{transform:scale(1);}
.lb-info{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap;}
.lb-info h3{font-family:'Space Grotesk';color:#fff;font-weight:700;font-size:1.1rem;margin-bottom:4px;}
.lb-info span{color:rgba(255,255,255,.5);font-size:.85rem;}
.lb-x{position:absolute;top:24px;right:28px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.8);width:40px;height:40px;border-radius:50%;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.2s;}
.lb-x:hover{background:rgba(255,255,255,.15);color:#fff;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.8);width:44px;height:44px;border-radius:50%;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.2s;}
.lb-nav:hover{background:rgba(37,99,235,.5);color:#fff;}
.lb-p{left:24px;}.lb-n{right:24px;}

/* Stats */
.creations-wrapper .stats{display:flex;gap:20px;padding:0 60px;max-width:1400px;margin:0 auto 80px;flex-wrap:wrap;}
.creations-wrapper .sp{background:var(--card);border:var(--gb);backdrop-filter:blur(10px);padding:14px 24px;border-radius:16px;display:flex;align-items:center;gap:12px;}
.creations-wrapper .sp .num{font-family:'Space Grotesk';font-size:1.8rem;font-weight:800;color:var(--accent);line-height:1;}
.creations-wrapper .sp .lbl{font-size:.8rem;font-weight:600;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;}

@media(max-width:768px){
  .hero,.wrap,.tabs,.stats,.creations-wrapper .sec-label{padding-left:24px;padding-right:24px;}
  .creations-wrapper .arr.prev{left:4px;}.creations-wrapper .arr.next{right:4px;}
  .sz-social,.sz-logo{width:200px;height:200px;}.sz-bijou{width:220px;height:220px;}
}

    /* =============================================
       CHATBOT FLOTTANT
    ============================================= */
    #chat-bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9000;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      pointer-events: none; /* ne bloque aucun clic par défaut */
    }
    /* Réactiver pointer-events uniquement sur les éléments interactifs */
    #chat-toggle,
    #chat-window.open,
    #chat-window.open * {
      pointer-events: auto;
    }

    #chat-toggle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: none !important;
      box-shadow: 0 4px 20px rgba(37,99,235,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .3s cubic-bezier(.25,.8,.25,1), box-shadow .3s;
      position: relative;
    }
    #chat-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(37,99,235,0.5);
    }
    #chat-toggle .chat-ping {
      position: absolute;
      top: 0; right: 0;
      width: 14px; height: 14px;
      background: #10b981;
      border-radius: 50%;
      border: 2px solid var(--bg);
      animation: ping-dot 2s infinite;
    }
    @keyframes ping-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }

    #chat-window {
      width: 340px;
      height: 480px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      transform: scale(0.85) translateY(20px);
      transform-origin: bottom right;
      pointer-events: none;
      transition: opacity .3s cubic-bezier(.25,.8,.25,1), transform .3s cubic-bezier(.25,.8,.25,1);
    }
    #chat-window.open {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: all;
    }

    .chat-header {
      padding: 16px 18px;
      background: var(--accent);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name {
      font-family: 'Space Grotesk';
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
    }
    .chat-header-status {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.75);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .chat-header-status::before {
      content: '';
      width: 6px; height: 6px;
      background: #10b981;
      border-radius: 50%;
      display: inline-block;
    }
    .chat-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 1.1rem;
      cursor: none !important;
      padding: 4px;
      transition: color .2s;
    }
    .chat-close:hover { color: #fff; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }

    .chat-msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.5;
      animation: msg-in .25s ease;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .chat-msg.bot {
      background: var(--card-bg);
      border: var(--glass-border);
      color: var(--text-main);
      border-radius: 4px 16px 16px 16px;
      align-self: flex-start;
    }
    .chat-msg.user {
      background: var(--accent);
      color: #fff;
      border-radius: 16px 4px 16px 16px;
      align-self: flex-end;
    }

    .chat-suggestions {
      padding: 0 16px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      flex-shrink: 0;
    }
    .chat-chip {
      font-size: 0.75rem;
      padding: 5px 11px;
      border-radius: 50px;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--spotlight-color);
      cursor: none !important;
      transition: .2s;
      font-family: 'Inter';
      white-space: nowrap;
    }
    .chat-chip:hover {
      background: var(--accent);
      color: #fff;
    }

    .chat-input-row {
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      border-top: var(--glass-border);
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      background: var(--card-bg);
      border: var(--glass-border);
      border-radius: 20px;
      padding: 8px 14px;
      font-family: 'Inter';
      font-size: 0.85rem;
      color: var(--text-main);
      outline: none;
      transition: border-color .2s;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--text-sec); }
    #chat-send {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: none !important;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      transition: transform .2s, box-shadow .2s;
      flex-shrink: 0;
    }
    #chat-send:hover { transform: scale(1.1); box-shadow: 0 4px 12px rgba(37,99,235,0.4); }

    /* Masquer le chatbot sur la page exp (plein écran) */
    body.mode-exp #chat-bubble { display: none; }
  </style>

        if (now - lastTime > 50) { createCracklingSpark(e.clientX, e.clientY); lastTime = now; }
      }

    function createCracklingSpark(x, y) {
      const el = document.createElement('div');
      el.classList.add('crackling-spark');
      el.style.left = x + 'px'; el.style.top = y + 'px';
      const angle = Math.random() * Math.PI * 2;
      const velocity = 40 + Math.random() * 60;
      el.style.setProperty('--tx', Math.cos(angle) * velocity + 'px');
      el.style.setProperty('--ty', Math.sin(angle) * velocity + 'px');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 500);
    }

    function initGrid() {
      points = [];
      for (let x = 0; x <= width; x += 35)
        for (let y = 0; y <= height; y += 35)
          points.push({ x, y, originX: x, originY: y, vx: 0, vy: 0 });

    function animate() {
      ctx.clearRect(0, 0, width, height);
      const skip = ['mode-temporal','mode-skills','mode-ventures','mode-media','mode-exp'].some(m => document.body.classList.contains(m));
      if (!skip) {
        const activeColor = document.body.classList.contains('dark-mode') ? '96, 165, 250' : '37, 99, 235';
        for (const p of points) {
          const dx = mouse.x - p.x, dy = mouse.y - p.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 150) {
            const force = (150 - dist) / 150;
            p.vx += Math.cos(Math.atan2(dy, dx)) * (-force * 1.5);
            p.vy += Math.sin(Math.atan2(dy, dx)) * (-force * 1.5);
          }
          p.vx += (p.originX - p.x) * 0.1; p.vy += (p.originY - p.y) * 0.1;
          p.vx *= 0.85; p.vy *= 0.85; p.x += p.vx; p.y += p.vy;
          const d = Math.sqrt((p.x - p.originX)**2 + (p.y - p.originY)**2);
          ctx.fillStyle = d > 0.5
            ? `rgba(${activeColor}, ${Math.min(d/15, 0.8)})`
            : (document.body.classList.contains('dark-mode') ? '#1E293B' : '#CBD5E1');
          ctx.beginPath(); ctx.arc(p.x, p.y, d > 0.5 ? 2 : 1.2, 0, Math.PI * 2); ctx.fill();
        }
      }
      requestAnimationFrame(animate);
    }

    /* -------- STATE -------- */
    // Pour la boucle infinie : on duplique les items [..clone..original..clone..]

    function cr_init() {
  if (_crResizeH) window.removeEventListener('resize', _crResizeH);
  if (_crKeyH)    document.removeEventListener('keydown', _crKeyH);

  const REPS = 30;
  const MID  = 15;
  const state = {};

  function buildCarousel(cat) {
    const track    = document.getElementById('t-' + cat);
    const scrubWrap = document.getElementById('d-' + cat);
    const items    = IMGS[cat];
    const n        = items.length;

    // Vider
    track.innerHTML = '';
    scrubWrap.innerHTML = '';

    // Créer REPS copies
    for (let rep = 0; rep < REPS; rep++) {
      items.forEach(function(imgSrc, li) {
        const m = META[cat][li];
        const d = document.createElement('div');
        d.className = 'card cr-card';
        d.innerHTML = '<img src="' + imgSrc + '" alt="' + m.t + '">' +
          (m.tag ? '<div class="ctag">' + m.tag + '</div>' : '') +
          '<div class="ov"><h3>' + m.t + '</h3><span>' + m.s + '</span></div>';
        d.addEventListener('click', (function(ri) { return function() { openLb(cat, ri); }; })(li));
        track.appendChild(d);
      });
    }

    // État : offset en pixels (continu, pas discret)
    const cardW = 280 + 20; // largeur + gap
    state[cat] = {
      n: n,
      offset: MID * n * cardW,  // départ au milieu
      dragging: false,
      dragStartX: 0,
      dragStartOffset: 0,
      vel: 0,
      lastX: 0,
      animId: null,
      cardW: cardW
    };

    positionTrack(cat);
    updateScrub(cat, scrubWrap);
    buildScrubBar(cat, scrubWrap);
    addDragListeners(cat);
  }

  function positionTrack(cat) {
    const track = document.getElementById('t-' + cat);
    const scene = track.parentElement;
    const sceneW = scene.offsetWidth;
    const off = state[cat].offset - sceneW / 2 + 140; // centrer
    track.style.transition = 'none';
    track.style.transform  = 'translateX(-' + off + 'px)';
    applyClasses(cat);
  }

  function applyClasses(cat) {
    const track  = document.getElementById('t-' + cat);
    const cards  = Array.from(track.querySelectorAll('.card'));
    const cardW  = state[cat].cardW;
    const scene  = track.parentElement;
    const sceneW = scene.offsetWidth;
    // Centre visuel en index de carte
    const centerCard = (state[cat].offset) / cardW;

    cards.forEach(function(c, i) {
      c.classList.remove('center','s1','s2','s3');
      const d = Math.abs(i - centerCard);
      if      (d < 0.5)  c.classList.add('center');
      else if (d < 1.5)  c.classList.add('s1');
      else if (d < 2.5)  c.classList.add('s2');
      else               c.classList.add('s3');
    });

    updateScrub(cat, document.getElementById('d-' + cat));
  }

  function recentre(cat) {
    const n    = state[cat].n;
    const cw   = state[cat].cardW;
    const total = REPS * n * cw;
    const mid   = MID * n * cw;
    // Garder la position relative mais dans la zone centrale
    const relOffset = state[cat].offset % (n * cw);
    if (state[cat].offset < 5 * n * cw || state[cat].offset > (REPS - 5) * n * cw) {
      state[cat].offset = mid + relOffset;
      positionTrack(cat);
    }
  }

  /* --- Drag sur le carousel --- */
  function addDragListeners(cat) {
    const scene = document.getElementById('t-' + cat).parentElement;

    function startDrag(clientX) {
      if (state[cat].animId) cancelAnimationFrame(state[cat].animId);
      state[cat].dragging       = true;
      state[cat].dragStartX     = clientX;
      state[cat].dragStartOffset = state[cat].offset;
      state[cat].vel            = 0;
      state[cat].lastX          = clientX;
      scene.style.cursor        = 'default';
    }

    function moveDrag(clientX) {
      if (!state[cat].dragging) return;
      const dx = clientX - state[cat].dragStartX;
      state[cat].vel    = clientX - state[cat].lastX;
      state[cat].lastX  = clientX;
      state[cat].offset = state[cat].dragStartOffset - dx;
      positionTrack(cat);
    }

    function endDrag() {
      if (!state[cat].dragging) return;
      state[cat].dragging = false;
      scene.style.cursor  = 'default';
      inertia(cat);
    }

    scene.addEventListener('mousedown',  function(e) { startDrag(e.clientX); e.preventDefault(); });
    scene.addEventListener('touchstart', function(e) { startDrag(e.touches[0].clientX); }, { passive: true });
    document.addEventListener('mousemove', function(e) { moveDrag(e.clientX); });
    document.addEventListener('touchmove', function(e) { moveDrag(e.touches[0].clientX); }, { passive: true });
    document.addEventListener('mouseup',   endDrag);
    document.addEventListener('touchend',  endDrag);
  }

  /* Inertie après relâchement */
  function inertia(cat) {
    let vel = state[cat].vel * 0.8;
    function tick() {
      if (Math.abs(vel) < 0.5) {
        snapToNearest(cat);
        return;
      }
      state[cat].offset -= vel;
      vel *= 0.92;
      positionTrack(cat);
      recentre(cat);
      state[cat].animId = requestAnimationFrame(tick);
    }
    tick();
  }

  /* Snap à la carte la plus proche */
  function snapToNearest(cat) {
    const cw      = state[cat].cardW;
    const nearest = Math.round(state[cat].offset / cw) * cw;
    const diff    = nearest - state[cat].offset;
    let t = 0;
    const duration = 12; // frames
    const start = state[cat].offset;
    function ease() {
      t++;
      state[cat].offset = start + diff * (t / duration);
      positionTrack(cat);
      if (t < duration) {
        state[cat].animId = requestAnimationFrame(ease);
      } else {
        state[cat].offset = nearest;
        positionTrack(cat);
        recentre(cat);
      }
    }
    ease();
  }

  /* --- Flèches --- */
  document.querySelectorAll('.arr').forEach(function(b) {
    b.addEventListener('click', function() {
      const cat = b.dataset.id;
      const dir = b.classList.contains('next') ? 1 : -1;
      if (state[cat].animId) cancelAnimationFrame(state[cat].animId);
      const target = state[cat].offset + dir * state[cat].cardW;
      const start  = state[cat].offset;
      const diff   = target - start;
      let t = 0; const dur = 18;
      function go() {
        t++;
        const p = t / dur;
        const ease = 1 - Math.pow(1 - p, 3);
        state[cat].offset = start + diff * ease;
        positionTrack(cat);
        if (t < dur) state[cat].animId = requestAnimationFrame(go);
        else { state[cat].offset = target; positionTrack(cat); recentre(cat); }
      }
      go();
    });
  });

  /* --- Barre de scrub miroir --- */
  function buildScrubBar(cat, container) {
    container.className = 'scrub-bar-wrap';
    const bar   = document.createElement('div');
    bar.className = 'scrub-bar';
    const fill  = document.createElement('div');
    fill.className = 'scrub-fill';
    const thumb = document.createElement('div');
    thumb.className = 'scrub-thumb';
    bar.appendChild(fill);
    bar.appendChild(thumb);
    container.appendChild(bar);

    // Drag sur la barre = scroll du carousel
    let scrubbing = false;
    bar.addEventListener('mousedown', function(e) {
      scrubbing = true;
      seek(cat, e.clientX, bar);
      e.preventDefault();
    });
    bar.addEventListener('touchstart', function(e) {
      scrubbing = true;
      seek(cat, e.touches[0].clientX, bar);
    }, { passive: true });
    document.addEventListener('mousemove', function(e) {
      if (!scrubbing) return;
      seek(cat, e.clientX, bar);
    });
    document.addEventListener('mouseup',  function() { scrubbing = false; recentre(cat); });
    document.addEventListener('touchmove', function(e) {
      if (!scrubbing) return;
      seek(cat, e.touches[0].clientX, bar);
    }, { passive: true });
    document.addEventListener('touchend', function() { scrubbing = false; recentre(cat); });

    state[cat].scrubBar = bar;
    state[cat].scrubFill = fill;
    state[cat].scrubThumb = thumb;
  }

  function seek(cat, clientX, bar) {
    const rect  = bar.getBoundingClientRect();
    const pct   = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const n     = state[cat].n;
    const cw    = state[cat].cardW;
    // Mapper pct -> offset dans la section centrale (MID*n ± n/2)
    const logical = pct * (n - 1);
    state[cat].offset = MID * n * cw + logical * cw;
    positionTrack(cat);
  }

  function updateScrub(cat, container) {
    if (!state[cat] || !state[cat].scrubThumb) return;
    const n   = state[cat].n;
    const cw  = state[cat].cardW;
    const mid = MID * n * cw;
    // Position logique relative (0..1) dans la fenêtre centrale
    const logical = (state[cat].offset - mid) / cw;
    const pct = Math.max(0, Math.min(1, logical / (n - 1)));
    state[cat].scrubThumb.style.left = (pct * 100) + '%';
    state[cat].scrubFill.style.width  = (pct * 100) + '%';
  }

  const PAINT_COLORS = ['#2563eb','#e11d48','#d97706','#10b981','#7c3aed','#0891b2','#dc2626'];
  function sprayPaint(x, y) {
    const count = 8 + Math.floor(Math.random() * 6);
    for (let i = 0; i < count; i++) {
      const drop = document.createElement('div');
      const color = PAINT_COLORS[Math.floor(Math.random() * PAINT_COLORS.length)];
      const size  = 4 + Math.random() * 8;
      const angle = Math.random() * Math.PI * 2;
      const dist  = 20 + Math.random() * 60;
      const tx    = Math.cos(angle) * dist;
      const ty    = Math.sin(angle) * dist;
      const dur   = 400 + Math.random() * 300;
      drop.style.cssText = [
        'position:fixed',
        'pointer-events:none',
        'z-index:99998',
        `left:${x}px`,
        `top:${y}px`,
        `width:${size}px`,
        `height:${size * (0.6 + Math.random()*0.8)}px`,
        `background:${color}`,
        'border-radius:50%',
        `transform:translate(-50%,-50%)`,
        `opacity:1`,
        'transition:none'
      ].join(';');
      document.body.appendChild(drop);
      // Animer
      requestAnimationFrame(() => {
        drop.style.transition = `transform ${dur}ms cubic-bezier(.25,.8,.25,1), opacity ${dur}ms ease`;
        drop.style.transform  = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0.3)`;
        drop.style.opacity    = '0';
      });
      setTimeout(() => drop.remove(), dur + 50);
    }
    // Petite éclaboussure centrale
    const splash = document.createElement('div');
    const sc = PAINT_COLORS[Math.floor(Math.random() * PAINT_COLORS.length)];
    splash.style.cssText = [
      'position:fixed','pointer-events:none','z-index:99998',
      `left:${x}px`,`top:${y}px`,
      'width:12px','height:12px',
      `background:${sc}`,
      'border-radius:50%',
      'transform:translate(-50%,-50%) scale(1)',
      'opacity:0.9',
      'transition:transform 200ms ease, opacity 200ms ease'
    ].join(';');
    document.body.appendChild(splash);
    requestAnimationFrame(() => {
      splash.style.transform = 'translate(-50%,-50%) scale(2.5)';
      splash.style.opacity   = '0';
    });
    setTimeout(() => splash.remove(), 250);
  }

  document.addEventListener('click', function(e) {
    if (!document.body.classList.contains('mode-creations')) return;
    sprayPaint(e.clientX, e.clientY);
  });

          r: "I was a Luxury Sales Advisor at Goossens Paris (Chanel Group jeweler) from 2023 to 2024, work-study. A unique experience in high jewelry at Chanel's standards of excellence. ✨" },
      { k: ['arkeoo','project','startup','entrepreneurship'],
          r: "Arkeoo is one of my entrepreneurial projects — a platform connecting entrepreneurs with partners, associates and investors. 🔗" },
      { k: ['cv','resume','download'],
          r: "You can download my resume directly from the home page by clicking the 'Download Resume' button. 📄" },
      { k: ['press','figaro','article','interview','manomano','christian raisson'],
          r: "I had the honor of interviewing Christian Raisson, co-founder of ManoMano, at an INSEEC evening in March 2026. The article was published in Le Figaro Étudiant! 📰" },
      { k: ['newsletter','publication'],
          r: "I launched the Kryptosphere INSEEC newsletter in 2026, for MSc students, covering Web3, AI and entrepreneurship. 📬" },
      { k: ['language','english','french','languages'],
          r: "I speak French (native) and English (fluent). 🌍" },
      { k: ['hello','hi','hey','good morning','good evening'],
          r: "Hello! 👋 I'm Kylian's portfolio assistant. Ask me anything about his background, experiences, projects or how to contact him!" },
      { k: ['thank','thanks','great','perfect','cool','awesome'],
          r: "You're welcome! Feel free to ask if you have more questions. 😊" },
      { k: ['ai','artificial intelligence','data','machine learning'],
          r: "I use AI daily: data synthesis, sector monitoring, AI-augmented content creation, advanced prompting and internal tool creation. 🤖" },
      { k: ['coding','code','development','vibe coding','api','prototype'],
          r: "I practice Vibe Coding (AI-assisted development), rapid MVP prototyping and API integration. 💻" },
      ];

    const CHIPS_EN = [
      "Who is Kylian?", "Experiences 💼", "Skills 🚀",
      "Azaios 💎", "Paymium ₿", "Contact 📧"
      ];

    const CHIP_SETS_EN = {
      default: ["Who is Kylian?", "Experiences 💼", "Skills 🚀", "Azaios 💎", "Paymium ₿", "Contact 📧"],
        contact: ["LinkedIn", "Download CV", "Projects", "Kryptosphere 🏛️"],
        exp:     ["Paymium ₿", "Goossens / Chanel ✨", "Azaios 💎", "Kryptosphere 🏛️"],
        skills:  ["AI & Data 🤖", "Coding 💻", "Management", "Contact 📧"],
        projects: ["Azaios 💎", "Arkeoo 🔗", "Kryptosphere 🏛️", "Experiences 💼"],
    };

    const DEFAULT_EN = "I don't have that answer, but you can contact Kylian directly: kylianperrault15@gmail.com 📧";

        function initChatbot() {


      function getAnswer(q) {
        const ql = q.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
        const kb  = currentLang === 'en' ? KB_EN : KB;
        const def = currentLang === 'en' ? DEFAULT_EN : DEFAULT;
        for (const item of kb) {
          if (item.k.some(k => ql.includes(k.normalize("NFD").replace(/[̀-ͯ]/g,"")))) {
            return item.r;
          }
        }
        return def;
      }

      const win     = document.getElementById('chat-window');
      const toggle  = document.getElementById('chat-toggle');
      const closeBtn= document.getElementById('chat-close-btn');
      const msgs    = document.getElementById('chat-messages');
      const input   = document.getElementById('chat-input');
      const send    = document.getElementById('chat-send');
      const chips   = document.getElementById('chat-chips');

      let isOpen = false;

      function toggleChat() {
        isOpen = !isOpen;
        win.classList.toggle('open', isOpen);
        toggle.querySelector('i').className = isOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-comment-dots';
        if (isOpen && msgs.children.length === 0) {
          addMsg(currentLang === 'en' ? "Hello! 👋 I'm Kylian's portfolio assistant. How can I help you?" : "Bonjour ! 👋 Je suis l'assistant de Kylian. Comment puis-je vous aider ?", 'bot');
          renderChips(currentLang === 'en' ? CHIPS_EN : CHIPS);
        }
      }

      toggle.addEventListener('click', toggleChat);
      closeBtn.addEventListener('click', toggleChat);

      function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = 'chat-msg ' + type;
        div.textContent = text;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function renderChips(set) {
        chips.innerHTML = '';
        (set || CHIPS).forEach(c => {
          const btn = document.createElement('button');
          btn.className = 'chat-chip';
          btn.textContent = c;
          btn.addEventListener('click', () => { sendMsg(c); });
          chips.appendChild(btn);
        });
      }

      // Suggestions contextuelles selon la réponse
      const CHIP_SETS = {
        default: ["Qui est Kylian ?", "Ses expériences 💼", "Ses compétences 🚀", "Azaios 💎", "Paymium ₿", "Me contacter 📧"],
        contact: ["Son LinkedIn", "Télécharger son CV", "Ses projets", "Kryptosphere 🏛️"],
        exp:     ["Paymium ₿", "Goossens / Chanel ✨", "Azaios 💎", "Kryptosphere 🏛️"],
        skills:  ["AI & Data 🤖", "Coding 💻", "Management", "Me contacter 📧"],
        projets: ["Azaios 💎", "Arkeoo 🔗", "Kryptosphere 🏛️", "Ses expériences 💼"],
      };

      function getChipSet(answer) {
        if (currentLang === 'en') {
          if (answer.includes('contact') || answer.includes('email') || answer.includes('LinkedIn')) return CHIP_SETS_EN.contact;
          if (answer.includes('Paymium') || answer.includes('Goossens') || answer.includes('work-study')) return CHIP_SETS_EN.exp;
          if (answer.includes('skill') || answer.includes('prompting') || answer.includes('Coding')) return CHIP_SETS_EN.skills;
          if (answer.includes('Azaios') || answer.includes('Arkeoo') || answer.includes('Kryptosphere')) return CHIP_SETS_EN.projects;
          return CHIP_SETS_EN.default;
        }
        if (answer.includes('contacter') || answer.includes('email') || answer.includes('LinkedIn')) return CHIP_SETS.contact;
        if (answer.includes('Paymium') || answer.includes('Goossens') || answer.includes('alternance')) return CHIP_SETS.exp;
        if (answer.includes('compétence') || answer.includes('prompting') || answer.includes('Coding')) return CHIP_SETS.skills;
        if (answer.includes('Azaios') || answer.includes('Arkeoo') || answer.includes('Kryptosphere')) return CHIP_SETS.projets;
        return CHIP_SETS.default;
      }

      function sendMsg(text) {
        const q = text || input.value.trim();
        if (!q) return;
        addMsg(q, 'user');
        input.value = '';
        chips.innerHTML = '';
        setTimeout(() => {
          const answer = getAnswer(q);
          addMsg(answer, 'bot');
          renderChips(getChipSet(answer));
        }, 350);
      }

      send.addEventListener('click', () => sendMsg());
      input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

      // Curseur
      document.addEventListener('mouseover', function(e) {
        if (e.target.closest('#chat-bubble')) document.body.classList.add('hovering');
      });
    }

    window.onload = () => {
      // Thème light par défaut, dark seulement si explicitement choisi
      document.body.classList.remove('dark-mode');
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.querySelector('.theme-toggle i').className = 'fa-solid fa-sun';
      } else {
        localStorage.setItem('theme', 'light');
        document.querySelector('.theme-toggle i').className = 'fa-solid fa-moon';
      }
      resize(); animate(); loadPage('home');
      initChatbot();
    };
  </script>

  <!-- CHATBOT FLOTTANT -->
  <div id="chat-bubble">
    <div id="chat-window">
      <div class="chat-header">
        <div class="chat-avatar">🤖</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-name">Assistant Portfolio</div>
          <div class="chat-header-status" id="chat-status">En ligne · Répond instantanément</div>
        </div>
        <button class="chat-close" id="chat-close-btn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-suggestions" id="chat-chips"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Posez une question...">
        <button id="chat-send"><i class="fa-solid fa-paper-plane"></i></button>
      </div>
    </div>
    <button id="chat-toggle">
      <i class="fa-solid fa-comment-dots"></i>
      <span class="chat-ping"></span>
    </button>
  </div>

</body>
</html>
